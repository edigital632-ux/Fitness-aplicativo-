<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitPlan Pro AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#0b0f14;
    color:white;
    padding:20px;
}

.container{
    max-width:1000px;
    margin:auto;
}

.header{
    margin-bottom:30px;
}

.logo{
    font-size:40px;
    font-weight:700;
    color:#63d2ff;
}

.subtitle{
    color:#94a3b8;
    margin-top:5px;
}

.search-box{
    margin-top:25px;
    display:flex;
    gap:10px;
}

.search-box input{
    flex:1;
    padding:16px;
    border:none;
    border-radius:12px;
    background:#151c24;
    color:white;
    font-size:16px;
    outline:none;
}

.search-box button{
    padding:16px 24px;
    border:none;
    border-radius:12px;
    background:#63d2ff;
    color:black;
    font-weight:700;
    cursor:pointer;
}

.section-title{
    margin-top:40px;
    margin-bottom:20px;
    font-size:26px;
    font-weight:700;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:#131922;
    border-radius:18px;
    overflow:hidden;
    border:1px solid rgba(255,255,255,0.05);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.exercise-image,
.food-image{
    width:100%;
    height:220px;
    object-fit:cover;
    background:black;
}

.card-content{
    padding:16px;
}

.card-title{
    font-size:20px;
    font-weight:700;
    margin-bottom:8px;
    text-transform:capitalize;
}

.card-desc{
    color:#94a3b8;
    font-size:14px;
    line-height:1.5;
}

.tags{
    display:flex;
    gap:10px;
    margin-top:12px;
    flex-wrap:wrap;
}

.tag{
    background:#1e293b;
    color:#63d2ff;
    padding:6px 10px;
    border-radius:8px;
    font-size:12px;
}

.loading{
    text-align:center;
    margin-top:20px;
    color:#63d2ff;
}

</style>
</head>

<body>

<div class="container">

    <div class="header">

        <div class="logo">
            FITPLAN PRO AI
        </div>

        <div class="subtitle">
            Aplicativo fitness com exercícios e alimentos
        </div>

        <div class="search-box">

            <input
                type="text"
                id="searchInput"
                placeholder="Digite peito, braço, costas..."
            >

            <button onclick="buscarExercicios()">
                Buscar
            </button>

        </div>

    </div>

    <div class="section-title">
        Exercícios
    </div>

    <div class="grid" id="exerciseGrid"></div>

    <div class="section-title">
        Alimentos Fitness
    </div>

    <div class="grid" id="foodGrid"></div>

    <div class="loading" id="loading"></div>

</div>

<script>

const PEXELS_API_KEY = "SUA_CHAVE_PEXELS";
const RAPID_API_KEY = "SUA_CHAVE_RAPIDAPI";

const exerciseGrid = document.getElementById("exerciseGrid");
const foodGrid = document.getElementById("foodGrid");
const loading = document.getElementById("loading");

async function buscarExercicios(){

    const busca =
        document.getElementById("searchInput").value || "chest";

    loading.innerHTML = "Carregando exercícios...";

    exerciseGrid.innerHTML = "";

    try{

        const response = await fetch(
            `https://exercisedb.p.rapidapi.com/exercises/bodyPart/${busca}`,
            {
                method:"GET",
                headers:{
                    "X-RapidAPI-Key": RAPID_API_KEY,
                    "X-RapidAPI-Host":"exercisedb.p.rapidapi.com"
                }
            }
        );

        const data = await response.json();

        const exercicios = data.slice(0,6);

        exercicios.forEach(exercicio => {

            exerciseGrid.innerHTML += `

            <div class="card">

                <img
                    class="exercise-image"
                    src="${exercicio.gifUrl}"
                >

                <div class="card-content">

                    <div class="card-title">
                        ${exercicio.name}
                    </div>

                    <div class="card-desc">
                        Músculo alvo: ${exercicio.target}
                    </div>

                    <div class="tags">

                        <div class="tag">
                            ${exercicio.bodyPart}
                        </div>

                        <div class="tag">
                            ${exercicio.equipment}
                        </div>

                    </div>

                </div>

            </div>

            `;

        });

    }catch(error){

        exerciseGrid.innerHTML = `
            <p>Erro ao carregar exercícios.</p>
        `;

    }

    loading.innerHTML = "";

}

async function carregarAlimentos(){

    const alimentos = [
        "frango grelhado",
        "banana",
        "arroz integral",
        "aveia",
        "ovo cozido",
        "salada fitness"
    ];

    foodGrid.innerHTML = "";

    for(const alimento of alimentos){

        try{

            const response = await fetch(
                `https://api.pexels.com/v1/search?query=${alimento}&per_page=1`,
                {
                    headers:{
                        Authorization:PEXELS_API_KEY
                    }
                }
            );

            const data = await response.json();

            const foto = data.photos[0];

            foodGrid.innerHTML += `

            <div class="card">

                <img
                    class="food-image"
                    src="${foto.src.large}"
                >

                <div class="card-content">

                    <div class="card-title">
                        ${alimento}
                    </div>

                    <div class="card-desc">
                        Alimento saudável para dieta fitness
                    </div>

                    <div class="tags">

                        <div class="tag">
                            Proteína
                        </div>

                        <div class="tag">
                            Fitness
                        </div>

                    </div>

                </div>

            </div>

            `;

        }catch(error){

            console.log(error);

        }

    }

}

buscarExercicios();
carregarAlimentos();

</script>

</body>
</html>
