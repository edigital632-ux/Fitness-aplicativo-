<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitPlan Pro AI - White Label</title>
    <style>
        :root { 
            --bg-dark: #0f172a;
            --surface-dark: #1e293b;
            --primary-neon: #38bdf8;
            --primary-gradient: linear-gradient(135deg, #0284c7, #38bdf8);
            --accent-green: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-glow: #334155;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); padding: 20px 12px; }
        
        .container { max-width: 550px; margin: 0 auto; background: var(--surface-dark); padding: 25px; border-radius: 24px; border: 1px solid var(--border-glow); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        
        header { text-align: center; margin-bottom: 25px; border-bottom: 1px solid var(--border-glow); padding-bottom: 20px; }
        header h1 { color: var(--primary-neon); font-size: 28px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
        header p { color: var(--text-muted); font-size: 13px; margin-top: 5px; font-weight: 500; }
        
        .form-group { display: flex; flex-direction: column; margin-bottom: 16px; }
        label { margin-bottom: 6px; font-weight: 700; font-size: 12px; color: var(--primary-neon); text-transform: uppercase; letter-spacing: 0.5px; }
        input, select, textarea { padding: 14px; border: 1.5px solid var(--border-glow); border-radius: 12px; font-size: 15px; width: 100%; outline: none; background: #111827; color: white; transition: all 0.2s; }
        input:focus, select:focus, textarea:focus { border-color: var(--primary-neon); box-shadow: 0 0 10px rgba(56, 189, 248, 0.2); }
        
        /* Estilo do Chat Interativo */
        .chat-area { background: #111827; border: 1px solid var(--border-glow); border-radius: 16px; padding: 15px; margin-top: 15px; min-height: 80px; max-height: 200px; overflow-y: auto; font-size: 14px; color: #e2e8f0; line-height: 1.5; display: none; }
        .chat-label-response { color: var(--accent-green); font-weight: 800; font-size: 12px; text-transform: uppercase; margin-bottom: 5px; letter-spacing: 0.5px; }

        .btn-submit { width: 100%; background: var(--primary-gradient); color: white; border: none; padding: 16px; font-size: 16px; font-weight: 700; border-radius: 14px; cursor: pointer; margin-top: 10px; transition: all 0.2s; box-shadow: 0 4px 15px rgba(2, 132, 199, 0.4); text-transform: uppercase; letter-spacing: 0.5px; }
        .btn-submit:active { transform: scale(0.98); }
        
        .tabs-container { display: none; margin-top: 30px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid var(--border-glow); padding-bottom: 12px; }
        .tab-btn { flex: 1; padding: 14px; background: #111827; border: 1px solid var(--border-glow); font-size: 14px; font-weight: 700; color: var(--text-muted); cursor: pointer; border-radius: 10px; transition: all 0.2s; }
        .tab-btn.active { color: white; background: var(--primary-gradient); border: none; box-shadow: 0 4px 10px rgba(2, 132, 199, 0.2); }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .item-card { background: #111827; border: 1px solid var(--border-glow); border-radius: 16px; padding: 18px; margin-bottom: 18px; position: relative; overflow: hidden; transition: border-color 0.2s; }
        .item-card:hover { border-color: var(--primary-neon); }
        .item-title { font-weight: 800; font-size: 17px; color: white; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
        .item-subtitle { font-size: 13px; color: var(--primary-neon); font-weight: 600; margin-bottom: 12px; }
        
        /* Botão para abrir o GIF de Execução Externo */
        .btn-video { display: inline-flex; align-items: center; justify-content: center; gap: 8px; width: 100%; background: #1e293b; color: var(--primary-neon); border: 1px solid var(--primary-neon); padding: 12px; font-size: 14px; font-weight: 700; border-radius: 10px; cursor: pointer; text-decoration: none; text-transform: uppercase; margin: 8px 0 14px 0; transition: all 0.2s; }
        .btn-video:hover { background: var(--primary-gradient); color: white; box-shadow: 0 0 15px rgba(56, 189, 248, 0.4); border-color: transparent; }
        
        .evolution-row { display: flex; align-items: center; gap: 12px; margin-top: 15px; padding-top: 15px; border-top: 1px dashed var(--border-glow); }
        .evolution-row input { padding: 10px; font-size: 15px; text-align: center; width: 85px; background: var(--surface-dark); color: #fff; border: 1px solid var(--border-glow); border-radius: 8px; }
        .btn-check { background: var(--accent-green); color: white; border: none; padding: 12px 18px; font-size: 13px; font-weight: 800; border-radius: 10px; cursor: pointer; flex: 1; text-transform: uppercase; transition: background 0.2s; }
        .btn-check:hover { background: #059669; }
        
        .food-item { display: flex; align-items: center; gap: 15px; background: #111827; padding: 14px; border-radius: 14px; margin-bottom: 12px; border: 1px solid var(--border-glow); }
        .food-img { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; border: 1px solid var(--border-glow); flex-shrink: 0; }
        .food-text { font-size: 14px; color: #f1f5f9; font-weight: 600; line-height: 1.5; }
        
        .footer-brand { text-align: center; margin-top: 35px; font-size: 11px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 id="brandName">FitPlan AI</h1>
        <p>Premium Fitness Intelligence System</p>
    </header>

    <div>
        <div class="form-group">
            <label>Nome Completo do Aluno</label>
            <input type="text" id="userName" placeholder="Ex: Jeferson Silva">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px;">
            <div class="form-group">
                <label>Idade</label>
                <input type="number" id="age" value="27">
            </div>
            <div class="form-group">
                <label>Peso (kg)</label>
                <input type="number" id="weight" value="70">
            </div>
            <div class="form-group">
                <label>Altura (cm)</label>
                <input type="number" id="height" value="170">
            </div>
        </div>

        <div class="form-group">
            <label>Objetivo Estipulado</label>
            <select id="objective">
                <option value="Hipertrofia">Hipertrofia (Ganho de Massa)</option>
                <option value="Emagrecimento">Emagrecimento (Perda de Gordura)</option>
                <option value="Definição Extrema">Definição Muscular</option>
            </select>
        </div>

        <div class="form-group">
            <label>Mensagem para o Personal Trainer (O que comeu / Como quer o treino)</label>
            <textarea id="userChatInput" rows="3" placeholder="Ex: Hoje quero focar em pernas e comi um bolo de chocolate à tarde, ajuste meu plano..."></textarea>
        </div>

        <button type="button" class="btn-submit" id="btnAction" onclick="generateWhiteLabelPlan()">🚀 Enviar e Consultar Personal AI</button>

        <div class="chat-area" id="chatResponseArea">
            <div class="chat-label-response">💬 Resposta do Personal Trainer:</div>
            <div id="chatResponseText"></div>
        </div>
    </div>

    <div class="tabs-container" id="resultSection">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('dietaTab', this)">🥗 Plano Alimentar</button>
            <button class="tab-btn" onclick="switchTab('treinoTab', this)">💪 Ficha de Treino ABC</button>
        </div>
        
        <div id="dietaTab" class="tab-content active">
            <div id="dietaOutput"></div>
        </div>
        
        <div id="treinoTab" class="tab-content">
            <div id="treinoOutput"></div>
        </div>
    </div>

    <div class="footer-brand" id="brandFooter">SaaS White Label Oficial</div>
</div>

<script>
    const NOME_ACADEMIA_CLIENTE = "Iron Fitness Club"; 
    let historicoEvolucaoCargas = [];

    document.getElementById('brandName').innerText = NOME_ACADEMIA_CLIENTE;
    document.getElementById('brandFooter').innerText = `Plataforma Exclusiva | ${NOME_ACADEMIA_CLIENTE}`;

    function switchTab(tabId, btn) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        btn.classList.add('active');
    }

    function registrarEvolucao(exercicioNome, inputId) {
        const cargaDigitada = document.getElementById(inputId).value;
        if(!cargaDigitada) { alert("Digite a carga atual para salvar!"); return; }
        historicoEvolucaoCargas.push({ exercicio: exercicioNome, carga: cargaDigitada });
        alert(`Sucesso! Carga de ${cargaDigitada}kg salva.`);
    }

    // Redirecionamento para busca externa de GIFs animados de execução de exercícios
    function parseTreinoComMidia(textoTreino) {
        const container = document.getElementById('treinoOutput');
        container.innerHTML = "";

        let linhas = textoTreino.split('\n').map(l => l.trim()).filter(l => l.length > 0);
        let cardCount = 0;

        linhas.forEach((linha) => {
            if(linha.toLowerCase().includes("parte 2") || linha.toLowerCase().includes("treino") || linha.toLowerCase().includes("---")) return;

            cardCount++;
            let card = document.createElement('div');
            card.className = 'item-card';

            let nomeExercicio = linha.split(',')[0].split('-')[0].trim().replace(/[0-9]x[0-9]+/gi, "");
            
            let titulo = document.createElement('div');
            titulo.className = 'item-title';
            titulo.innerText = `🏋️ ${nomeExercicio}`;
            card.appendChild(titulo);

            let detalhes = document.createElement('div');
            detalhes.className = 'item-subtitle';
            detalhes.innerText = linha.includes(',') ? linha.substring(linha.indexOf(',') + 1).trim() : "4 séries de 10-12 repetições";
            card.appendChild(detalhes);

            // Redirecionamento focado exclusivamente em arquivos GIF externos ao clicar
            let gifQuery = encodeURIComponent(nomeExercicio + " exercise gif animation");
            let externalGifUrl = `https://www.google.com/search?tbm=isch&q=${gifQuery}+site:giphy.com+OR+site:tenor.com`;

            let videoLink = document.createElement('a');
            videoLink.className = 'btn-video';
            videoLink.href = externalGifUrl;
            videoLink.target = '_blank';
            videoLink.innerHTML = `🖼️ Ver GIF de Execução`;
            card.appendChild(videoLink);

            let inputId = `carga_treino_${cardCount}`;
            let evoDiv = document.createElement('div');
            evoDiv.className = 'evolution-row';
            evoDiv.innerHTML = `
                <label style='margin:0;'>CARGA:</label>
                <input type='number' id='${inputId}' value='20'>
                <button class='btn-check' onclick="registrarEvolucao('${linha.replace(/'|"/g, "")}', '${inputId}')">✔️ Concluir Série</button>
            `;
            card.appendChild(evoDiv);
            container.appendChild(card);
        });
    }

    // Renderizador fiel de alimentos estruturados pela Inteligência Artificial
    function parseDietaComImagens(textoDieta) {
        let output = document.getElementById('dietaOutput');
        output.innerHTML = "";

        let lines = textoDieta.split('\n').map(l => l.trim()).filter(l => l.length > 0);
        
        lines.forEach(linha => {
            if(linha.toLowerCase().includes("---")) return;
            
            let linhaMinuscula = linha.toLowerCase();
            let imgUrl = "https://images.unsplash.com/photo-1498837167922-ddd27525d352?w=150&q=80";

            if (linhaMinuscula.includes("ovo") || linhaMinuscula.includes("omelete")) {
                imgUrl = "https://images.unsplash.com/photo-1525351484163-7529414344d8?w=150&q=80";
            } else if (linhaMinuscula.includes("frango") || linhaMinuscula.includes("grelhado") || linhaMinuscula.includes("peito")) {
                imgUrl = "https://images.unsplash.com/photo-1604503468506-a8da13d82791?w=150&q=80";
            } else if (linhaMinuscula.includes("banana") || linhaMinuscula.includes("fruta") || linhaMinuscula.includes("maçã")) {
                imgUrl = "https://images.unsplash.com/photo-1571771894821-ce9b6c11b08e?w=150&q=80";
            } else if (linhaMinuscula.includes("arroz") || linhaMinuscula.includes("carboidrato")) {
                imgUrl = "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=150&q=80";
            } else if (linhaMinuscula.includes("lanche") || linhaMinuscula.includes("castanha") || linhaMinuscula.includes("aveia")) {
                imgUrl = "https://images.unsplash.com/photo-1511690656952-34342bb7c2f2?w=150&q=80";
            }

            let foodDiv = document.createElement('div');
            foodDiv.className = 'food-item';
            foodDiv.innerHTML = `
                <img src="${imgUrl}" class="food-img" alt="Refeição">
                <div class="food-text">${linha}</div>
            `;
            output.appendChild(foodDiv);
        });
    }

    async function generateWhiteLabelPlan() {
        const name = document.getElementById('userName').value.trim() || "Aluno";
        const age = document.getElementById('age').value;
        const weight = document.getElementById('weight').value;
        const height = document.getElementById('height').value;
        const objective = document.getElementById('objective').value;
        const userChatMessage = document.getElementById('userChatInput').value.trim();
        const btn = document.getElementById('btnAction');

        btn.disabled = true;
        btn.innerText = "⚡ ANALISANDO SEU FEEDBACK COM O PERSONAL...";

        let promptMessage = `Você é o Personal Trainer Chefe e Nutricionista da ${NOME_ACADEMIA_CLIENTE}. Responda ao aluno de forma direta e motivadora.
        Perfil do Aluno: Nome ${name}, Idade ${age} anos, Peso ${weight}kg, Altura ${height}cm, Objetivo: ${objective}.`;
        
        if(userChatMessage) {
            promptMessage += `\n\nO Aluno enviou a seguinte mensagem sobre a rotina/alimentação dele hoje: "${userChatMessage}". Adapte rigorosamente o plano em cima disso e responda o comentário dele de forma breve no início da resposta.`;
        }

        promptMessage += `\n\nDivida estritamente a sua resposta inteira usando estes três marcadores exatos abaixo:
        ---RESPOSTA_CHAT---
        (Escreva aqui um parágrafo curto respondendo de forma direta, humanizada e profissional o relato ou dúvida que o aluno escreveu na caixa de chat).
        ---DIETA---
        (Monte o plano alimentar estruturado linha por linha de acordo com o que ele relatou ou objetivo).
        ---TREINO---
        (Liste exatamente 4 exercícios ideais, um por linha, com séries/repetições, sem numeração e sem símbolos adicionais como asteriscos ou hashtags).`;

        const url = `https://text.pollinations.ai/${encodeURIComponent(promptMessage)}?model=openai&cache=false`;

        try {
            const response = await fetch(url);
            const fullText = await response.text();

            let chatText = "Análise concluída com sucesso! Seus novos planos adaptados foram gerados nas abas abaixo.";
            let dietaText = "";
            let treinoText = "";

            // Divisor Inteligente de Abas de Conversa Completa
            if (fullText.includes("---RESPOSTA_CHAT---") && fullText.includes("---DIETA---") && fullText.includes("---TREINO---")) {
                let partsChat = fullText.split("---DIETA---");
                let topParts = partsChat[0].split("---RESPOSTA_CHAT---");
                chatText = topParts[1].trim();
                
                let bottomParts = partsChat[1].split("---TREINO---");
                dietaText = bottomParts[0].trim();
                treinoText = bottomParts[1].trim();
            } else if (fullText.includes("---TREINO---")) {
                let parts = fullText.split("---TREINO---");
                dietaText = parts[0].replace("---DIETA---", "").trim();
                treinoText = parts[1].trim();
            } else {
                dietaText = fullText;
                treinoText = "Supino Reto 4x10\nAgachamento Livre 4x12\nRosca Direta 4x10\nPuxada Costas 4x12";
            }

            // Exibe a resposta em formato chat de texto
            document.getElementById('chatResponseText').innerText = chatText;
            document.getElementById('chatResponseArea').style.display = 'block';

            // Monta as abas de resultado
            document.getElementById('resultSection').style.display = 'block';
            document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });

            parseDietaComImagens(dietaText);
            parseTreinoComMidia(treinoText);

        } catch (error) {
            alert("Ocorreu uma instabilidade na rede. Por favor, clique novamente para sincronizar.");
        } finally {
            btn.disabled = false;
            btn.innerText = "🚀 Enviar e Consultar Personal AI";
        }
    }
</script>

</body>
</html>
