<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitPlan Pro AI</title>
    <style>
        :root { 
            --primary: #2563eb; 
            --primary-dark: #1d4ed8; 
            --accent: #10b981; 
            --background: #f1f5f9; 
            --surface: #ffffff; 
            --text: #0f172a; 
            --text-light: #64748b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
        body { background-color: var(--background); color: var(--text); padding: 15px; scroll-behavior: smooth; }
        .container { max-width: 600px; margin: 0 auto; background: var(--surface); padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        header h1 { color: var(--primary); font-size: 26px; font-weight: 800; }
        header p { color: var(--text-light); font-size: 13px; }
        .form-group { display: flex; flex-direction: column; margin-bottom: 12px; }
        label { margin-bottom: 4px; font-weight: 600; font-size: 13px; }
        input, select, textarea { padding: 10px; border: 2px solid #cbd5e1; border-radius: 8px; font-size: 15px; width: 100%; outline: none; }
        input:focus, select:focus, textarea:focus { border-color: var(--primary); }
        textarea { resize: vertical; height: 70px; font-size: 14px; }
        
        .btn-submit { width: 100%; background: var(--primary); color: white; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 10px; }
        .btn-submit:hover { background: var(--primary-dark); }
        
        .loading-box { display: none; text-align: center; margin: 20px 0; }
        .spinner { border: 4px solid rgba(0,0,0,0.1); width: 36px; height: 36px; border-radius: 50%; border-left-color: var(--primary); animation: spin 0.8s linear infinite; margin: 0 auto 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .output-box { display: none; margin-top: 20px; padding: 20px; background: #fafafa; border-left: 5px solid var(--accent); border-radius: 8px; }
        .output-box h2 { color: var(--accent); font-size: 18px; margin-bottom: 15px; border-bottom: 1px solid #e2e8f0; padding-bottom: 5px; }
        
        .ai-content { font-size: 15px; color: #334155; white-space: pre-wrap; line-height: 1.6; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>FitPlan Pro AI</h1>
        <p>Plataforma Inteligente de Treino e Dieta Corporativa</p>
    </header>

    <div>
        <div class="form-group">
            <label>Nome do Aluno</label>
            <input type="text" id="userName" placeholder="Ex: João Silva">
        </div>

        <div class="form-group">
            <label>Sexo</label>
            <select id="gender">
                <option value="Masculino">Masculino</option>
                <option value="Feminino">Feminino</option>
            </select>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
            <div class="form-group">
                <label>Idade</label>
                <input type="number" id="age" value="25">
            </div>
            <div class="form-group">
                <label>Peso (kg)</label>
                <input type="number" id="weight" value="70">
            </div>
            <div class="form-group">
                <label>Altura (cm)</label>
                <input type="number" id="height" value="170">
            </div>
        </div>

        <div class="form-group" style="margin-top: 12px;">
            <label>Objetivo</label>
            <select id="objective">
                <option value="Hipertrofia (Ganho de massa muscular)">Hipertrofia (Ganho de Massa)</option>
                <option value="Emagrecimento (Definição e perda de gordura)">Emagrecimento (Perda de Gordura)</option>
                <option value="Resistência e Condicionamento Físico">Condicionamento Geral</option>
            </select>
        </div>

        <div class="form-group">
            <label>Observações ou Pedidos Especiais à IA (Opcional)</label>
            <textarea id="customRequest" placeholder="Ex: Tenho dor no joelho, sou vegetariano, prefiro treinar 4 dias..."></textarea>
        </div>

        <button type="button" class="btn-submit" onclick="generatePlanWithAI()">🚀 Consultar IA e Gerar Plano</button>
    </div>

    <div class="loading-box" id="loadingSection">
        <div class="spinner"></div>
        <p style="font-size: 14px; color: var(--primary); font-weight: 500;">A IA está montando sua estratégia personalizada...</p>
    </div>

    <div class="output-box" id="outputSection">
        <h2>📋 Planejamento Personalizado</h2>
        <div id="aiResponse" class="ai-content"></div>
    </div>
</div>

<script>
    async function generatePlanWithAI() {
        const name = document.getElementById('userName').value.trim() || "Aluno";
        const gender = document.getElementById('gender').value;
        const age = document.getElementById('age').value;
        const weight = document.getElementById('weight').value;
        const height = document.getElementById('height').value;
        const objective = document.getElementById('objective').value;
        const customRequest = document.getElementById('customRequest').value.trim();

        if (!age || !weight || !height) {
            alert('Por favor, preencha a idade, peso e altura!');
            return;
        }

        document.getElementById('outputSection').style.display = 'none';
        document.getElementById('loadingSection').style.display = 'block';

        // Montando a instrução injetando o nome e o pedido especial digitado pelo usuário
        let promptMessage = `Atue como um Personal Trainer e Nutricionista Esportivo focado em atendimento VIP. Monte um planejamento completo para o aluno chamado ${name}. 
        Perfil do aluno: Sexo: ${gender}, Idade: ${age} anos, Peso: ${weight}kg, Altura: ${height}cm, Objetivo: ${objective}.`;
        
        if (customRequest) {
            promptMessage += `\nATENÇÃO - O aluno ${name} fez o seguinte pedido especial que você DEVE obedecer rigorosamente: "${customRequest}".`;
        }

        promptMessage += `\n\nComece o texto saudando o aluno pelo nome de forma motivadora. Depois, escreva o Plano Alimentar estruturado refeição por refeição. Por fim, escreva a Ficha de Treino detalhada dividida em Treino A, Treino B e Treino C. Não use caracteres especiais como asteriscos (*) ou hashtags (#), use apenas quebras de linha normais para organizar o texto.`;

        const url = `https://text.pollinations.ai/${encodeURIComponent(promptMessage)}?model=openai&cache=false`;

        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error("Erro de resposta");
            const textResponse = await response.text();

            document.getElementById('aiResponse').innerText = textResponse.trim();
            document.getElementById('outputSection').style.display = 'block';
            document.getElementById('outputSection').scrollIntoView({ behavior: 'smooth' });

        } catch (error) {
            console.error(error);
            document.getElementById('aiResponse').innerHTML = "<p style='color:red;'>⚠️ Erro ao gerar dados. Tente novamente.</p>";
            document.getElementById('outputSection').style.display = 'block';
        } finally {
            document.getElementById('loadingSection').style.display = 'none';
        }
    }
</script>

</body>
</html>
