<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitPlan Pro AI</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --black: #050607;
  --surface: #0d1117;
  --card: #111820;
  --card-hover: #161e29;
  --border: rgba(255,255,255,0.06);
  --border-active: rgba(99,210,255,0.4);
  --primary: #63d2ff;
  --primary-dim: rgba(99,210,255,0.12);
  --green: #4ade80;
  --green-dim: rgba(74,222,128,0.1);
  --orange: #fb923c;
  --orange-dim: rgba(251,146,60,0.1);
  --red: #f87171;
  --text: #f0f4f8;
  --text-muted: #64748b;
  --text-soft: #94a3b8;
  --radius: 14px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--black);
  color: var(--text);
  min-height: 100vh;
  padding: 24px 16px 80px;
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -20%, rgba(99,210,255,0.06), transparent),
    radial-gradient(ellipse 40% 30% at 80% 80%, rgba(74,222,128,0.03), transparent);
}
.app { max-width: 560px; margin: 0 auto; }

/* HEADER */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 4px; margin-bottom: 32px;
}
.logo-block { display: flex; align-items: baseline; gap: 10px; }
.logo-text {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 34px; letter-spacing: 2px; color: var(--text); line-height: 1;
}
.logo-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; font-weight: 600; color: var(--primary);
  background: var(--primary-dim); border: 1px solid rgba(99,210,255,0.2);
  padding: 3px 8px; border-radius: 4px; letter-spacing: 1px;
}
.header-status { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--text-muted); }
.status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--green); box-shadow: 0 0 8px var(--green);
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* TABS */
.tabs {
  display: flex; gap: 4px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 4px; margin-bottom: 24px;
}
.tab {
  flex: 1; padding: 10px 6px; border: none; border-radius: 10px;
  background: transparent; color: var(--text-muted);
  font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px;
}
.tab.active { background: var(--surface); color: var(--text); }
.tab:hover:not(.active) { color: var(--text-soft); }

/* SECTION LABEL */
.section-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; font-weight: 600; letter-spacing: 2px;
  text-transform: uppercase; color: var(--text-muted);
  margin-bottom: 12px; padding-left: 2px;
}

/* SEARCH BAR */
.search-bar {
  display: flex; gap: 8px; margin-bottom: 16px;
}
.search-input {
  flex: 1; background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 12px 16px;
  color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px;
  outline: none; transition: border-color 0.2s;
}
.search-input:focus { border-color: var(--border-active); }
.search-input::placeholder { color: var(--text-muted); }
.search-btn {
  background: var(--primary); color: #000;
  border: none; border-radius: var(--radius-sm);
  padding: 12px 20px; font-weight: 700; font-size: 13px;
  cursor: pointer; transition: opacity 0.2s; white-space: nowrap;
}
.search-btn:hover { opacity: 0.85; }
.search-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* FILTER CHIPS */
.chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.chip {
  padding: 6px 14px; border-radius: 20px;
  border: 1px solid var(--border); background: var(--card);
  color: var(--text-soft); font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all 0.2s;
}
.chip.active { border-color: var(--primary); color: var(--primary); background: var(--primary-dim); }
.chip:hover:not(.active) { border-color: rgba(255,255,255,0.15); color: var(--text); }

/* EXERCISE GRID */
.exercise-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
}
.exercise-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
  cursor: pointer; transition: all 0.2s;
}
.exercise-card:hover { border-color: rgba(99,210,255,0.3); transform: translateY(-2px); }
.exercise-gif-wrap {
  position: relative; width: 100%; aspect-ratio: 1;
  background: #0a0f15; overflow: hidden;
}
.exercise-gif-wrap img {
  width: 100%; height: 100%; object-fit: cover;
  display: block;
}
.gif-loading {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: #0a0f15;
}
.spinner {
  width: 28px; height: 28px; border: 2px solid var(--border);
  border-top-color: var(--primary); border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.exercise-info { padding: 10px 12px 12px; }
.exercise-name {
  font-size: 12px; font-weight: 600; color: var(--text);
  margin-bottom: 4px; line-height: 1.3;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.exercise-meta { display: flex; gap: 6px; flex-wrap: wrap; }
.exercise-tag {
  font-size: 10px; font-family: 'JetBrains Mono', monospace;
  background: var(--primary-dim); color: var(--primary);
  padding: 2px 7px; border-radius: 4px;
}
.exercise-tag.orange { background: var(--orange-dim); color: var(--orange); }

/* MODAL */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.85); backdrop-filter: blur(6px);
  z-index: 100; align-items: center; justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--card); border: 1px solid var(--border-active);
  border-radius: 20px; width: 100%; max-width: 420px;
  max-height: 85vh; overflow-y: auto; animation: modalIn 0.25s ease;
}
@keyframes modalIn { from{transform:scale(0.92);opacity:0} to{transform:scale(1);opacity:1} }
.modal-gif {
  width: 100%; aspect-ratio: 1;
  background: #0a0f15; position: relative;
}
.modal-gif img { width: 100%; height: 100%; object-fit: contain; display: block; }
.modal-body { padding: 20px; }
.modal-title {
  font-size: 20px; font-weight: 700; margin-bottom: 6px;
  text-transform: capitalize;
}
.modal-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.modal-tag {
  font-size: 11px; font-family: 'JetBrains Mono', monospace;
  padding: 4px 10px; border-radius: 6px;
}
.modal-tag.blue { background: var(--primary-dim); color: var(--primary); border: 1px solid rgba(99,210,255,0.2); }
.modal-tag.green { background: var(--green-dim); color: var(--green); border: 1px solid rgba(74,222,128,0.2); }
.modal-tag.orange { background: var(--orange-dim); color: var(--orange); border: 1px solid rgba(251,146,60,0.2); }
.modal-section { margin-bottom: 16px; }
.modal-section-title { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--text-muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; }
.instructions-list { list-style: none; counter-reset: inst; }
.instructions-list li {
  counter-increment: inst; position: relative;
  padding: 8px 10px 8px 36px;
  background: var(--surface); border-radius: 8px; margin-bottom: 6px;
  font-size: 13px; color: var(--text-soft); line-height: 1.5;
}
.instructions-list li::before {
  content: counter(inst); position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  width: 18px; height: 18px; background: var(--primary-dim); color: var(--primary);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; font-family: 'JetBrains Mono', monospace;
}
.modal-close {
  width: 100%; padding: 14px; background: transparent;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  color: var(--text-soft); font-size: 14px; font-weight: 600;
  cursor: pointer; transition: all 0.2s; margin-top: 8px;
}
.modal-close:hover { border-color: var(--red); color: var(--red); }

/* FOOD SECTION */
.food-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
}
.food-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
  cursor: pointer; transition: all 0.2s;
}
.food-card:hover { border-color: rgba(74,222,128,0.3); transform: translateY(-2px); }
.food-img-wrap {
  width: 100%; aspect-ratio: 4/3;
  background: #0a0f15; overflow: hidden; position: relative;
}
.food-img-wrap img {
  width: 100%; height: 100%; object-fit: cover; display: block;
  transition: transform 0.3s;
}
.food-card:hover .food-img-wrap img { transform: scale(1.05); }
.food-category-pill {
  position: absolute; top: 8px; left: 8px;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
  color: var(--green); font-size: 9px; font-family: 'JetBrains Mono', monospace;
  padding: 3px 8px; border-radius: 4px; font-weight: 600;
}
.food-info { padding: 10px 12px 12px; }
.food-name {
  font-size: 13px; font-weight: 600; color: var(--text);
  margin-bottom: 6px; line-height: 1.3;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.food-macros { display: flex; gap: 6px; }
.food-macro {
  display: flex; flex-direction: column; align-items: center;
  background: var(--surface); border-radius: 6px; padding: 4px 8px; flex: 1;
}
.food-macro-val { font-size: 13px; font-weight: 700; color: var(--text); font-family: 'JetBrains Mono', monospace; }
.food-macro-lbl { font-size: 9px; color: var(--text-muted); text-transform: uppercase; }

/* FOOD MODAL */
.food-modal-img { width: 100%; aspect-ratio: 16/9; overflow: hidden; background: #0a0f15; }
.food-modal-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
.food-ingredient-list { list-style: none; }
.food-ingredient-list li {
  padding: 8px 12px; font-size: 13px; color: var(--text-soft);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.food-ingredient-list li::before { content: "·"; color: var(--green); font-size: 20px; line-height: 0; }
.food-ingredient-list li:last-child { border-bottom: none; }

/* EMPTY / ERROR */
.empty-state {
  text-align: center; padding: 48px 20px; color: var(--text-muted);
}
.empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty-text { font-size: 14px; }

/* LOADING STATE */
.loading-state {
  text-align: center; padding: 48px 20px; color: var(--text-muted);
}
.loading-state .spinner { margin: 0 auto 12px; }
.loading-state p { font-size: 14px; }

/* SCROLL */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="logo-block">
      <span class="logo-text">FITPLAN</span>
      <span class="logo-badge">PRO AI</span>
    </div>
    <div class="header-status">
      <div class="status-dot"></div>
      <span>Online</span>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('exercises')" id="tab-exercises">
      💪 Exercícios
    </button>
    <button class="tab" onclick="switchTab('food')" id="tab-food">
      🥗 Alimentação
    </button>
  </div>

  <!-- ======= EXERCISES TAB ======= -->
  <div id="panel-exercises">
    <div class="section-label">Buscar Exercício</div>
    <div class="search-bar">
      <input class="search-input" id="exercise-search" placeholder="Ex: chest, bicep, squat..." />
      <button class="search-btn" onclick="searchExercises()" id="exercise-btn">Buscar</button>
    </div>

    <div class="chips" id="muscle-chips">
      <div class="chip active" onclick="chipClick(this,'all')" data-muscle="all">Todos</div>
      <div class="chip" onclick="chipClick(this,'chest')" data-muscle="chest">Peito</div>
      <div class="chip" onclick="chipClick(this,'back')" data-muscle="back">Costas</div>
      <div class="chip" onclick="chipClick(this,'shoulders')" data-muscle="shoulders">Ombro</div>
      <div class="chip" onclick="chipClick(this,'upper arms')" data-muscle="upper arms">Braços</div>
      <div class="chip" onclick="chipClick(this,'upper legs')" data-muscle="upper legs">Pernas</div>
      <div class="chip" onclick="chipClick(this,'waist')" data-muscle="waist">Abdômen</div>
      <div class="chip" onclick="chipClick(this,'cardio')" data-muscle="cardio">Cardio</div>
    </div>

    <div id="exercise-results"></div>
  </div>

  <!-- ======= FOOD TAB ======= -->
  <div id="panel-food" style="display:none">
    <div class="section-label">Buscar Alimento / Receita</div>
    <div class="search-bar">
      <input class="search-input" id="food-search" placeholder="Ex: chicken, salad, rice..." />
      <button class="search-btn" onclick="searchFood()" id="food-btn">Buscar</button>
    </div>

    <div class="chips">
      <div class="chip active" onclick="foodCategoryClick(this,'')" data-cat="">Todos</div>
      <div class="chip" onclick="foodCategoryClick(this,'Chicken')" data-cat="Chicken">Frango</div>
      <div class="chip" onclick="foodCategoryClick(this,'Beef')" data-cat="Beef">Carne</div>
      <div class="chip" onclick="foodCategoryClick(this,'Seafood')" data-cat="Seafood">Frutos do Mar</div>
      <div class="chip" onclick="foodCategoryClick(this,'Vegetarian')" data-cat="Vegetarian">Vegetariano</div>
      <div class="chip" onclick="foodCategoryClick(this,'Vegan')" data-cat="Vegan">Vegano</div>
      <div class="chip" onclick="foodCategoryClick(this,'Pasta')" data-cat="Pasta">Massa</div>
    </div>

    <div id="food-results"></div>
  </div>
</div>

<!-- ======= EXERCISE MODAL ======= -->
<div class="modal-overlay" id="exercise-modal" onclick="closeModalOnBg(event,'exercise-modal')">
  <div class="modal">
    <div class="modal-gif">
      <div class="gif-loading" id="modal-gif-loading"><div class="spinner"></div></div>
      <img id="modal-gif-img" src="" alt="" style="display:none" onload="gifLoaded()" onerror="gifError()">
    </div>
    <div class="modal-body">
      <div class="modal-title" id="modal-name"></div>
      <div class="modal-tags" id="modal-tags"></div>
      <div class="modal-section">
        <div class="modal-section-title">Como Executar</div>
        <ul class="instructions-list" id="modal-instructions"></ul>
      </div>
      <button class="modal-close" onclick="closeModal('exercise-modal')">✕ Fechar</button>
    </div>
  </div>
</div>

<!-- ======= FOOD MODAL ======= -->
<div class="modal-overlay" id="food-modal" onclick="closeModalOnBg(event,'food-modal')">
  <div class="modal">
    <div class="food-modal-img">
      <img id="food-modal-img" src="" alt="">
    </div>
    <div class="modal-body">
      <div class="modal-title" id="food-modal-name"></div>
      <div class="modal-tags" id="food-modal-tags"></div>
      <div class="modal-section">
        <div class="modal-section-title">Ingredientes</div>
        <ul class="food-ingredient-list" id="food-modal-ingredients"></ul>
      </div>
      <div class="modal-section" id="food-modal-instructions-section">
        <div class="modal-section-title">Preparo</div>
        <p id="food-modal-instructions" style="font-size:13px;color:var(--text-soft);line-height:1.7;"></p>
      </div>
      <button class="modal-close" onclick="closeModal('food-modal')">✕ Fechar</button>
    </div>
  </div>
</div>

<script>
// ─── STATE ───
let currentMuscle = 'all';
let currentFoodCat = '';
let exercises = [];
let foods = [];

// ─── TABS ───
function switchTab(tab) {
  document.getElementById('panel-exercises').style.display = tab === 'exercises' ? '' : 'none';
  document.getElementById('panel-food').style.display = tab === 'food' ? '' : 'none';
  document.getElementById('tab-exercises').classList.toggle('active', tab === 'exercises');
  document.getElementById('tab-food').classList.toggle('active', tab === 'food');
  if (tab === 'food' && foods.length === 0) loadDefaultFood();
  if (tab === 'exercises' && exercises.length === 0) loadDefaultExercises();
}

// ─── EXERCISE CHIPS ───
function chipClick(el, muscle) {
  document.querySelectorAll('#muscle-chips .chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  currentMuscle = muscle;
  document.getElementById('exercise-search').value = '';
  loadDefaultExercises();
}

// ─── EXERCISE API ───
async function loadDefaultExercises() {
  showExerciseLoading();
  let url;
  if (currentMuscle === 'all') {
    url = 'https://exercisedb.p.rapidapi.com/exercises?limit=20&offset=0';
  } else {
    url = `https://exercisedb.p.rapidapi.com/exercises/bodyPart/${encodeURIComponent(currentMuscle)}?limit=20&offset=0`;
  }
  await fetchExercises(url);
}

async function searchExercises() {
  const q = document.getElementById('exercise-search').value.trim();
  if (!q) { loadDefaultExercises(); return; }
  showExerciseLoading();
  const url = `https://exercisedb.p.rapidapi.com/exercises/name/${encodeURIComponent(q)}?limit=20&offset=0`;
  await fetchExercises(url);
}

async function fetchExercises(url) {
  document.getElementById('exercise-btn').disabled = true;
  try {
    const res = await fetch(url, {
      headers: {
        'x-rapidapi-key': 'demokey',  // placeholder – ver nota abaixo
        'x-rapidapi-host': 'exercisedb.p.rapidapi.com'
      }
    });
    if (!res.ok) throw new Error('API error');
    const data = await res.json();
    exercises = Array.isArray(data) ? data : [];
    renderExercises();
  } catch(e) {
    // fallback: usar wger.de (open source, sem key)
    await fetchExercisesWger();
  } finally {
    document.getElementById('exercise-btn').disabled = false;
  }
}

// WGER fallback (open source, sem API key)
async function fetchExercisesWger() {
  try {
    const muscle = currentMuscle === 'all' ? '' : currentMuscle;
    const q = document.getElementById('exercise-search').value.trim();
    const search = q || muscle;
    const url = `https://wger.de/api/v2/exercise/?format=json&language=2&limit=20&offset=0${search ? '&name='+encodeURIComponent(search) : ''}`;
    const res = await fetch(url);
    const data = await res.json();
    const imgs = await fetchWgerImages(data.results);
    exercises = imgs;
    renderExercises();
  } catch(e2) {
    useFallbackData();
  }
}

async function fetchWgerImages(exList) {
  const result = [];
  for (const ex of exList.slice(0, 20)) {
    try {
      const imgRes = await fetch(`https://wger.de/api/v2/exerciseimage/?format=json&exercise_base=${ex.exercise_base}&limit=1`);
      const imgData = await imgRes.json();
      result.push({
        id: ex.id,
        name: ex.name || 'Exercise',
        bodyPart: 'body',
        target: ex.category?.name || 'strength',
        equipment: 'bodyweight',
        gifUrl: imgData.results?.[0]?.image || '',
        instructions: ex.description ? [ex.description.replace(/<[^>]*>/g,'').trim()] : ['Execute the movement with controlled form.']
      });
    } catch(_) {}
  }
  return result;
}

// Fallback com dados locais + GIFs do giphy/exercicio
function useFallbackData() {
  const fallback = [
    { id:1, name:'Push-Up', bodyPart:'chest', target:'pectorals', equipment:'body weight',
      gifUrl:'https://media.giphy.com/media/7YCC7C1ZvfTGMa5v4x/giphy.gif',
      instructions:['Posicione as mãos levemente mais largas que os ombros','Mantenha o corpo reto como uma prancha','Desça até o peito quase tocar o chão','Empurre de volta à posição inicial']},
    { id:2, name:'Pull-Up', bodyPart:'back', target:'lats', equipment:'body weight',
      gifUrl:'https://media.giphy.com/media/3o7TKSjRrfIPjeiVyM/giphy.gif',
      instructions:['Segure a barra com pegada supinada','Puxe o corpo para cima até o queixo ultrapassar a barra','Desça de forma controlada','Repita o movimento']},
    { id:3, name:'Squat', bodyPart:'upper legs', target:'quads', equipment:'body weight',
      gifUrl:'https://media.giphy.com/media/CoDiPAmQgRopFhAHgi/giphy.gif',
      instructions:['Fique em pé com os pés na largura dos ombros','Empurre o quadril para trás e dobre os joelhos','Desça até as coxas ficarem paralelas ao chão','Suba de volta à posição inicial']},
    { id:4, name:'Plank', bodyPart:'waist', target:'abs', equipment:'body weight',
      gifUrl:'https://media.giphy.com/media/aT7RGCPmkxkXS/giphy.gif',
      instructions:['Apoie os antebraços e pontas dos pés no chão','Mantenha o corpo em linha reta da cabeça aos pés','Contraia o abdômen e glúteos','Segure a posição pelo tempo desejado']},
    { id:5, name:'Burpee', bodyPart:'cardio', target:'full body', equipment:'body weight',
      gifUrl:'https://media.giphy.com/media/l1J3zMvDiN1GCxjNm/giphy.gif',
      instructions:['Em pé, pule e eleve os braços','Ao descer, coloque as mãos no chão','Jogue os pés para trás em posição de prancha','Faça uma flexão, traga os pés, e salte novamente']},
    { id:6, name:'Lunges', bodyPart:'upper legs', target:'quads', equipment:'body weight',
      gifUrl:'https://media.giphy.com/media/1qfKN8Dt0BNlMnM5JY/giphy.gif',
      instructions:['Fique em pé com os pés juntos','Dê um passo largo à frente com uma perna','Desça até o joelho traseiro quase tocar o chão','Volte à posição e repita com a outra perna']},
    { id:7, name:'Shoulder Press', bodyPart:'shoulders', target:'deltoids', equipment:'dumbbell',
      gifUrl:'https://media.giphy.com/media/3oz8xwKNHXSMt6GZa0/giphy.gif',
      instructions:['Segure os halteres na altura dos ombros','Pressione os pesos para cima até os braços ficarem estendidos','Desça lentamente de volta à posição inicial','Mantenha o core contraído durante o movimento']},
    { id:8, name:'Bicep Curl', bodyPart:'upper arms', target:'biceps', equipment:'dumbbell',
      gifUrl:'https://media.giphy.com/media/Wvo6vaUsQa3Di/giphy.gif',
      instructions:['Segure os halteres com os braços estendidos','Flexione os cotovelos levantando os pesos','Leve os halteres até os ombros','Desça de forma controlada']},
  ];
  exercises = fallback;
  renderExercises();
}

function renderExercises() {
  const container = document.getElementById('exercise-results');
  if (!exercises || exercises.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">Nenhum exercício encontrado.<br>Tente outra busca.</div></div>`;
    return;
  }
  let html = '<div class="exercise-grid">';
  exercises.forEach((ex, i) => {
    const name = (ex.name || 'Exercise').replace(/\b\w/g,c=>c.toUpperCase());
    const muscle = ex.target || ex.bodyPart || '';
    const part = ex.bodyPart || '';
    const hasGif = !!ex.gifUrl;
    html += `
    <div class="exercise-card" onclick="openExercise(${i})">
      <div class="exercise-gif-wrap">
        ${hasGif
          ? `<div class="gif-loading" id="gifload-${i}"><div class="spinner"></div></div>
             <img src="${ex.gifUrl}" alt="${name}" style="opacity:0;transition:opacity 0.3s"
               onload="this.style.opacity=1;document.getElementById('gifload-${i}').style.display='none'"
               onerror="document.getElementById('gifload-${i}').innerHTML='<span style=\\'font-size:32px\\'>💪</span>'">`
          : `<div style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;font-size:40px">💪</div>`
        }
      </div>
      <div class="exercise-info">
        <div class="exercise-name">${name}</div>
        <div class="exercise-meta">
          ${muscle ? `<span class="exercise-tag">${muscle}</span>` : ''}
          ${part && part !== muscle ? `<span class="exercise-tag orange">${part}</span>` : ''}
        </div>
      </div>
    </div>`;
  });
  html += '</div>';
  container.innerHTML = html;
}

function showExerciseLoading() {
  document.getElementById('exercise-results').innerHTML = `
    <div class="loading-state">
      <div class="spinner"></div>
      <p>Carregando exercícios...</p>
    </div>`;
}

// ─── EXERCISE MODAL ───
function openExercise(i) {
  const ex = exercises[i];
  if (!ex) return;
  const name = (ex.name || 'Exercise').replace(/\b\w/g,c=>c.toUpperCase());
  document.getElementById('modal-name').textContent = name;

  // tags
  const tags = [];
  if (ex.bodyPart) tags.push({label: ex.bodyPart, cls:'blue'});
  if (ex.target && ex.target !== ex.bodyPart) tags.push({label: ex.target, cls:'green'});
  if (ex.equipment) tags.push({label: ex.equipment, cls:'orange'});
  document.getElementById('modal-tags').innerHTML = tags.map(t=>`<span class="modal-tag ${t.cls}">${t.label}</span>`).join('');

  // instructions
  const instructions = ex.instructions && ex.instructions.length > 0
    ? ex.instructions
    : ['Mantenha a postura correta durante o exercício','Execute o movimento de forma controlada','Respire de forma constante','Foque na contração muscular'];
  document.getElementById('modal-instructions').innerHTML = instructions.map(inst=>`<li>${inst}</li>`).join('');

  // gif
  const gifImg = document.getElementById('modal-gif-img');
  const gifLoad = document.getElementById('modal-gif-loading');
  gifLoad.style.display = 'flex';
  gifLoad.innerHTML = '<div class="spinner"></div>';
  gifImg.style.display = 'none';
  if (ex.gifUrl) {
    gifImg.src = ex.gifUrl;
  } else {
    gifLoad.innerHTML = '<span style="font-size:50px">💪</span>';
  }

  document.getElementById('exercise-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function gifLoaded() {
  document.getElementById('modal-gif-img').style.display = 'block';
  document.getElementById('modal-gif-loading').style.display = 'none';
}

function gifError() {
  document.getElementById('modal-gif-loading').innerHTML = '<span style="font-size:50px">💪</span>';
}

// ─── FOOD API (TheMealDB — 100% grátis, sem key) ───
async function loadDefaultFood() {
  showFoodLoading();
  const queries = ['chicken', 'beef', 'salmon', 'salad', 'pasta', 'rice'];
  const q = queries[Math.floor(Math.random()*queries.length)];
  await fetchFood(q);
}

async function searchFood() {
  const q = document.getElementById('food-search').value.trim();
  if (!q) { loadDefaultFood(); return; }
  showFoodLoading();
  await fetchFood(q);
}

async function fetchFood(q) {
  document.getElementById('food-btn').disabled = true;
  try {
    const res = await fetch(`https://www.themealdb.com/api/json/v1/1/search.php?s=${encodeURIComponent(q)}`);
    const data = await res.json();
    foods = data.meals || [];
    if (currentFoodCat) {
      foods = foods.filter(m => m.strCategory === currentFoodCat);
    }
    renderFoods();
  } catch(e) {
    document.getElementById('food-results').innerHTML = `<div class="empty-state"><div class="empty-icon">❌</div><div class="empty-text">Erro ao carregar. Tente novamente.</div></div>`;
  } finally {
    document.getElementById('food-btn').disabled = false;
  }
}

async function fetchFoodByCategory(cat) {
  showFoodLoading();
  document.getElementById('food-btn').disabled = true;
  try {
    const res = await fetch(`https://www.themealdb.com/api/json/v1/1/filter.php?c=${encodeURIComponent(cat)}`);
    const data = await res.json();
    // filter returns limited info, get details for first 10
    const meals = (data.meals || []).slice(0, 10);
    const detailed = [];
    for (const m of meals.slice(0,8)) {
      try {
        const r = await fetch(`https://www.themealdb.com/api/json/v1/1/lookup.php?i=${m.idMeal}`);
        const d = await r.json();
        if (d.meals?.[0]) detailed.push(d.meals[0]);
      } catch(_) { detailed.push(m); }
    }
    foods = detailed;
    renderFoods();
  } catch(e) {
    document.getElementById('food-results').innerHTML = `<div class="empty-state"><div class="empty-icon">❌</div><div class="empty-text">Erro ao carregar.</div></div>`;
  } finally {
    document.getElementById('food-btn').disabled = false;
  }
}

function renderFoods() {
  const container = document.getElementById('food-results');
  if (!foods || foods.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">Nenhum alimento encontrado.<br>Tente outra busca.</div></div>`;
    return;
  }
  let html = '<div class="food-grid">';
  foods.forEach((meal, i) => {
    const img = meal.strMealThumb || '';
    const name = meal.strMeal || 'Meal';
    const cat = meal.strCategory || '';
    // estimate macros from category
    const macros = estimateMacros(cat, meal.strMeal);
    html += `
    <div class="food-card" onclick="openFood(${i})">
      <div class="food-img-wrap">
        ${img
          ? `<div class="gif-loading" id="fload-${i}"><div class="spinner"></div></div>
             <img src="${img}" alt="${name}" style="opacity:0;transition:opacity 0.4s"
               onload="this.style.opacity=1;document.getElementById('fload-${i}').style.display='none'"
               onerror="document.getElementById('fload-${i}').innerHTML='<span style=\\'font-size:32px\\'>🍽️</span>'">`
          : `<div style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;font-size:40px">🍽️</div>`
        }
        ${cat ? `<span class="food-category-pill">${cat}</span>` : ''}
      </div>
      <div class="food-info">
        <div class="food-name">${name}</div>
        <div class="food-macros">
          <div class="food-macro"><span class="food-macro-val">${macros.cal}</span><span class="food-macro-lbl">Kcal</span></div>
          <div class="food-macro"><span class="food-macro-val">${macros.pro}g</span><span class="food-macro-lbl">Prot</span></div>
          <div class="food-macro"><span class="food-macro-val">${macros.carb}g</span><span class="food-macro-lbl">Carb</span></div>
        </div>
      </div>
    </div>`;
  });
  html += '</div>';
  container.innerHTML = html;
}

function estimateMacros(cat, name) {
  const n = (name || '').toLowerCase();
  const c = (cat || '').toLowerCase();
  if (c.includes('chicken')) return {cal:285,pro:35,carb:12};
  if (c.includes('beef')) return {cal:340,pro:28,carb:18};
  if (c.includes('seafood')) return {cal:220,pro:30,carb:8};
  if (c.includes('vegetarian') || c.includes('vegan')) return {cal:180,pro:12,carb:28};
  if (c.includes('pasta')) return {cal:380,pro:14,carb:52};
  if (n.includes('salad')) return {cal:145,pro:10,carb:16};
  if (n.includes('rice')) return {cal:260,pro:8,carb:48};
  return {cal:320,pro:22,carb:30};
}

function showFoodLoading() {
  document.getElementById('food-results').innerHTML = `
    <div class="loading-state">
      <div class="spinner"></div>
      <p>Carregando receitas...</p>
    </div>`;
}

function foodCategoryClick(el, cat) {
  document.querySelectorAll('.chips .chip[data-cat]').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  currentFoodCat = cat;
  document.getElementById('food-search').value = '';
  if (cat) { fetchFoodByCategory(cat); }
  else { loadDefaultFood(); }
}

// ─── FOOD MODAL ───
function openFood(i) {
  const meal = foods[i];
  if (!meal) return;
  document.getElementById('food-modal-name').textContent = meal.strMeal || '';

  // tags
  const tags = [];
  if (meal.strCategory) tags.push({label: meal.strCategory, cls:'green'});
  if (meal.strArea) tags.push({label: meal.strArea, cls:'blue'});
  if (meal.strTags) meal.strTags.split(',').slice(0,2).forEach(t => tags.push({label:t.trim(),cls:'orange'}));
  document.getElementById('food-modal-tags').innerHTML = tags.map(t=>`<span class="modal-tag ${t.cls}">${t.label}</span>`).join('');

  // ingredients
  const ingredients = [];
  for (let j=1; j<=20; j++) {
    const ing = meal[`strIngredient${j}`];
    const meas = meal[`strMeasure${j}`];
    if (ing && ing.trim()) ingredients.push(`${meas ? meas.trim()+' ' : ''}${ing.trim()}`);
  }
  document.getElementById('food-modal-ingredients').innerHTML =
    ingredients.length ? ingredients.map(g=>`<li>${g}</li>`).join('') : '<li>Ingredientes não disponíveis</li>';

  // instructions
  const instr = meal.strInstructions || '';
  document.getElementById('food-modal-instructions').textContent = instr ? instr.slice(0,600)+(instr.length>600?'...':'') : 'Instruções não disponíveis.';

  // image
  document.getElementById('food-modal-img').src = meal.strMealThumb || '';

  document.getElementById('food-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

// ─── MODALS ───
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  document.body.style.overflow = '';
}
function closeModalOnBg(e, id) {
  if (e.target === document.getElementById(id)) closeModal(id);
}

// ─── INIT ───
loadDefaultExercises();
</script>
