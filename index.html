<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitPlan Pro AI</title>
    <style>
        :root { 
            --primary: #1e40af; 
            --primary-light: #3b82f6;
            --accent: #059669; 
            --background: #f8fafc; 
            --surface: #ffffff; 
            --text: #0f172a; 
            --text-light: #475569;
            --border: #e2e8f0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--background); color: var(--text); padding: 20px 15px; }
        
        .container { max-width: 600px; margin: 0 auto; background: var(--surface); padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); }
        
        header { text-align: center; margin-bottom: 25px; }
        header h1 { color: var(--primary); font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }
        header p { color: var(--text-light); font-size: 14px; margin-top: 4px; }
        
        .form-group { display: flex; flex-direction: column; margin-bottom: 16px; }
        label { margin-bottom: 6px; font-weight: 600; font-size: 13px; color: var(--text); text-transform: uppercase; letter-spacing: 0.5px; }
        input, select, textarea { padding: 12px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 15px; width: 100%; outline: none; transition: all 0.2s; background: #fdfdfd; }
        input:focus, select:focus, textarea:focus { border-color: var(--primary-light); background: #fff; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        textarea { resize: vertical; height: 80px; font-size: 14px; }
        
        .btn-submit { width: 100%; background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: white; border: none; padding: 16px; font-size: 16px; font-weight: 700; border-radius: 12px; cursor: pointer; margin-top: 10px; transition: all 0.2s; box-shadow: 0 4px 12px rgba(30, 64, 175, 0.2); }
        .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(30, 64, 175, 0.3); }
        .btn-submit:active { transform: translateY(1px); }
        
        .tabs-container { display: none; margin-top: 30px; animation: fadeIn 0.4s ease; }
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 2px solid var(--border); padding-bottom: 10px; }
        .tab-btn { flex: 1; padding: 12px; background: none; border: none; font-size: 15px; font-weight: 700; color: var(--text-light); cursor: pointer; border-radius: 8px; transition: all 0.2s; }
        .tab-btn.active { color: var(--primary); background: rgba(59, 130, 246, 0.08); }
        
        .tab-content { display: none; background: #fff; border-radius: 12px; }
        .tab-content.active { display: block; }

        .typing::after { content: '▌'; animation: blink 0.6s infinite; color: var(--primary-light); font-weight: bold; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .ai-formatted { font-size: 15px; color: #334155; white-space: pre-wrap; line-height: 1.7; padding: 10px 5px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>FitPlan Pro AI</h1>
        <p>Sistema Inteligente de Prescrição Corporativa</p>
    </header>

    <div>
        <div class="form-group">
            <label>Nome do Aluno</label>
            <input type="text" id="userName" placeholder="Ex: João Silva">
        </div>

        <div class="form-group">
            <label>Sexo</label>
            <select id="gender">
                <option value="Masculino">Masculino</option>
                <option value="Feminino">Feminino</option>
            </select>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
            <div class="form-group">
                <label>Idade</label>
                <input type="number" id="age" value="25">
            </div>
            <div class="form-group">
                <label>Peso (kg)</label>
                <input type="number" id="weight" value="70">
            </div>
            <div class="form-group">
                <label>Altura (cm)</label>
                <input type="number" id="height" value="170">
            </div>
        </div>

        <div class="form-group">
            <label>Objetivo</label>
            <select id="objective">
                <option value="Hipertrofia">Hipertrofia (Ganho de Massa)</option>
                <option value="Emagrecimento">Emagrecimento (Perda de Gordura)</option>
                <option value="Condicionamento">Condicionamento Geral</option>
            </select>
        </div>

        <div class="form-group">
            <label>Restrições ou Preferências (Opcional)</label>
            <textarea id="customRequest" placeholder="Ex: Tenho problema no joelho, sou vegetariano, prefiro treinar em casa..."></textarea>
        </div>

        <button type="button" class="btn-submit" id="btnAction" onclick="generatePlanPro()">🚀 Gerar Planejamento de Alta Performance</button>
    </div>

    <div class="tabs-container" id="resultSection">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('dietaTab', this)">🥗 Plano Alimentar</button>
            <button class="tab-btn" onclick="switchTab('treinoTab', this)">💪 Ficha de Treino</button>
        </div>
        
        <div id="dietaTab" class="tab-content active">
            <div id="dietaOutput" class="ai-formatted"></div>
        </div>
        
        <div id="treinoTab" class="tab-content">
            <div id="treinoOutput" class="ai-formatted"></div>
        </div>
    </div>
</div>

<script>
    function switchTab(tabId, btn) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        btn.classList.add('active');
    }

    function typeEffect(text, elementId, callback) {
        const element = document.getElementById(elementId);
        element.innerHTML = "";
        element.classList.add('typing');
        
        let words = text.split(" ");
        let i = 0;
        
        function type() {
            if (i < words.length) {
                element.innerHTML += words[i] + " ";
                i++;
                setTimeout(type, 15); 
            } else {
                element.classList.remove('typing');
                if(callback) callback();
            }
        }
        type();
    }

    async function fetchWithRetry(url, options = {}, retries = 3) {
        for (let i = 0; i < retries; i++) {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 25000);
                
                const response = await fetch(url, { ...options, signal: controller.signal });
                clearTimeout(timeoutId);
                
                if (response.ok) return await response.text();
            } catch (err) {
                console.warn(`Tentativa ${i + 1} falhou.`);
                if (i === retries - 1) throw err;
                await new Promise(res => setTimeout(res, 1500)); 
            }
        }
    }

    async function generatePlanPro() {
        const name = document.getElementById('userName').value.trim() || "Aluno";
        const gender = document.getElementById('gender').value;
        const age = document.getElementById('age').value;
        const weight = document.getElementById('weight').value;
        const height = document.getElementById('height').value;
        const objective = document.getElementById('objective').value;
        const customRequest = document.getElementById('customRequest').value.trim();
        const btn = document.getElementById('btnAction');

        if (!age || !weight || !height) {
            alert('Por favor, preencha os dados biométricos obrigatórios.');
            return;
        }

        btn.disabled = true;
        btn.innerText = "⚡ Analisando Biometria e Gerando Plano...";
        document.getElementById('resultSection').style.display = 'none';

        // Melhoramos os marcadores para garantir que a IA os escreva de forma idêntica
        let promptMessage = `Atue como um Personal Trainer e Nutricionista Esportivo de alta performance. Monte um planejamento completo de dieta e treino focado no aluno chamado ${name}. Perfil: Sexo ${gender}, ${age} anos, ${weight}kg, ${height}cm, Objetivo: ${objective}.`;
        
        if (customRequest) {
            promptMessage += ` Restrição importante: "${customRequest}".`;
        }

        promptMessage += ` Escreva o plano completo estruturado estritamente em duas partes limpas utilizando os cabeçalhos exatos abaixo:

        PARTE 1: DIETA
        Faça uma saudação inicial breve a(o) ${name}. Monte o Plano Alimentar estruturado refeição por refeição de forma clara.

        PARTE 2: TREINO
        Monte a Ficha de Treino ABC detalhada com os exercícios, séries e repetições de forma limpa.

        Regra crucial: Não use nenhum caractere especial como asteriscos (*) ou hashtags (#), use apenas linhas normais e pulos de linha.`;

        const url = `https://text.pollinations.ai/${encodeURIComponent(promptMessage)}?model=openai&cache=false`;

        try {
            const fullText = await fetchWithRetry(url);

            let dietaText = "";
            let treinoText = "";

            // Sistema inteligente flexível de corte por palavra-chave para evitar falhas de separação nas abas
            if (fullText.includes("PARTE 2: TREINO")) {
                let parts = fullText.split("PARTE 2: TREINO");
                dietaText = parts[0].replace("PARTE 1: DIETA", "").trim();
                treinoText = parts[1].trim();
            } else if (fullText.includes("TREINO")) {
                let parts = fullText.split("TREINO");
                dietaText = parts[0].replace("DIETA", "").trim();
                treinoText = parts[1].trim();
            } else {
                // Caso a IA mude a estrutura por completo, entrega o texto inteiro na aba de dieta e instrui na aba de treino
                dietaText = fullText;
                treinoText = "O plano completo foi gerado. Caso o treino apareça junto na aba anterior, refine os parâmetros.";
            }

            document.getElementById('resultSection').style.display = 'block';
            document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });
            
            // Inicia o efeito do ChatGPT na aba de Dieta e insere o Treino perfeitamente em background
            typeEffect(dietaText, 'dietaOutput', () => {
                document.getElementById('treinoOutput').innerText = treinoText;
            });

        } catch (error) {
            alert("O servidor de IA demorou um pouco para responder. Por favor, clique novamente para recalibrar.");
        } finally {
            btn.disabled = false;
            btn.innerText = "🚀 Gerar Planejamento de Alta Performance";
        }
    }
</script>

</body>
</html>
