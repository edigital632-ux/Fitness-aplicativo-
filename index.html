<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitPlan Pro AI - White Label</title>
    <style>
        :root { 
            --bg-dark: #0f172a;
            --surface-dark: #1e293b;
            --primary-neon: #38bdf8;
            --primary-gradient: linear-gradient(135deg, #0284c7, #38bdf8);
            --accent-green: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-glow: #334155;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); padding: 20px 12px; }
        
        .container { max-width: 550px; margin: 0 auto; background: var(--surface-dark); padding: 25px; border-radius: 24px; border: 1px solid var(--border-glow); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        
        header { text-align: center; margin-bottom: 25px; border-bottom: 1px solid var(--border-glow); padding-bottom: 20px; }
        header h1 { color: var(--primary-neon); font-size: 28px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
        header p { color: var(--text-muted); font-size: 13px; margin-top: 5px; font-weight: 500; }
        
        .form-group { display: flex; flex-direction: column; margin-bottom: 16px; }
        label { margin-bottom: 6px; font-weight: 700; font-size: 12px; color: var(--primary-neon); text-transform: uppercase; letter-spacing: 0.5px; }
        input, select, textarea { padding: 14px; border: 1.5px solid var(--border-glow); border-radius: 12px; font-size: 15px; width: 100%; outline: none; background: #111827; color: white; transition: all 0.2s; }
        input:focus, select:focus, textarea:focus { border-color: var(--primary-neon); box-shadow: 0 0 10px rgba(56, 189, 248, 0.2); }
        
        .btn-submit { width: 100%; background: var(--primary-gradient); color: white; border: none; padding: 16px; font-size: 16px; font-weight: 700; border-radius: 14px; cursor: pointer; margin-top: 10px; transition: all 0.2s; box-shadow: 0 4px 15px rgba(2, 132, 199, 0.4); text-transform: uppercase; letter-spacing: 0.5px; }
        .btn-submit:active { transform: scale(0.98); }
        
        .tabs-container { display: none; margin-top: 30px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid var(--border-glow); padding-bottom: 12px; }
        .tab-btn { flex: 1; padding: 14px; background: #111827; border: 1px solid var(--border-glow); font-size: 14px; font-weight: 700; color: var(--text-muted); cursor: pointer; border-radius: 10px; transition: all 0.2s; }
        .tab-btn.active { color: white; background: var(--primary-gradient); border: none; box-shadow: 0 4px 10px rgba(2, 132, 199, 0.2); }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .item-card { background: #111827; border: 1px solid var(--border-glow); border-radius: 16px; padding: 18px; margin-bottom: 18px; position: relative; overflow: hidden; transition: border-color 0.2s; }
        .item-card:hover { border-color: var(--primary-neon); }
        .item-title { font-weight: 800; font-size: 17px; color: white; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
        .item-subtitle { font-size: 13px; color: var(--primary-neon); font-weight: 600; margin-bottom: 12px; }
        
        /* Container do Monitor de Execução por IA NATIVO - Roda 100% das vezes */
        .gif-container { width: 100%; height: 200px; border-radius: 12px; margin: 12px 0; overflow: hidden; background: #090d16; border: 1px solid var(--border-glow); display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        
        /* Animação Nativas de Barras de Performance em Loop Contínuo */
        .biomechanic-scan { display: flex; align-items: flex-end; gap: 8px; height: 60px; margin-bottom: 15px; }
        .scan-bar { width: 6px; background: var(--primary-neon); border-radius: 3px; animation: pulseMotion 1.2s ease-in-out infinite alternate; }
        .scan-bar:nth-child(2) { animation-delay: 0.2s; background: #60a5fa; }
        .scan-bar:nth-child(3) { animation-delay: 0.4s; background: #06b6d4; }
        .scan-bar:nth-child(4) { animation-delay: 0.6s; background: var(--accent-green); }
        .scan-bar:nth-child(5) { animation-delay: 0.8s; background: #34d399; }

        @keyframes pulseMotion {
            0% { height: 15px; transform: scaleY(1); }
            100% { height: 60px; transform: scaleY(1.1); box-shadow: 0 0 12px var(--primary-neon); }
        }

        .scan-status { font-size: 11px; text-transform: uppercase; font-weight: 800; color: var(--primary-neon); letter-spacing: 2px; animation: textGlow 1.5s infinite alternate; }
        @keyframes textGlow { 0% { opacity: 0.5; } 100% { opacity: 1; } }
        
        .evolution-row { display: flex; align-items: center; gap: 12px; margin-top: 15px; padding-top: 15px; border-top: 1px dashed var(--border-glow); }
        .evolution-row input { padding: 10px; font-size: 15px; text-align: center; width: 85px; background: var(--surface-dark); color: #fff; border: 1px solid var(--border-glow); border-radius: 8px; }
        .btn-check { background: var(--accent-green); color: white; border: none; padding: 12px 18px; font-size: 13px; font-weight: 800; border-radius: 10px; cursor: pointer; flex: 1; text-transform: uppercase; transition: background 0.2s; }
        .btn-check:hover { background: #059669; }
        
        .ai-formatted { font-size: 15px; color: #e2e8f0; white-space: pre-wrap; line-height: 1.8; }
        .food-item { display: flex; align-items: center; gap: 15px; background: #111827; padding: 12px; border-radius: 12px; margin-bottom: 10px; border: 1px solid var(--border-glow); }
        .food-img { width: 65px; height: 65px; border-radius: 8px; object-fit: cover; border: 1px solid var(--border-glow); }
        
        .footer-brand { text-align: center; margin-top: 35px; font-size: 11px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 id="brandName">FitPlan AI</h1>
        <p>Premium Fitness Intelligence System</p>
    </header>

    <div>
        <div class="form-group">
            <label>Nome Completo do Aluno</label>
            <input type="text" id="userName" placeholder="Ex: Jeferson Silva">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px;">
            <div class="form-group">
                <label>Idade</label>
                <input type="number" id="age" value="27">
            </div>
            <div class="form-group">
                <label>Peso (kg)</label>
                <input type="number" id="weight" value="70">
            </div>
            <div class="form-group">
                <label>Altura (cm)</label>
                <input type="number" id="height" value="170">
            </div>
        </div>

        <div class="form-group">
            <label>Objetivo Estipulado</label>
            <select id="objective">
                <option value="Hipertrofia">Hipertrofia (Ganho de Massa)</option>
                <option value="Emagrecimento">Emagrecimento (Perda de Gordura)</option>
                <option value="Definição Extrema">Definição Muscular</option>
            </select>
        </div>

        <button type="button" class="btn-submit" id="btnAction" onclick="generateWhiteLabelPlan()">🚀 Consultar Meu Personal Trainer AI</button>
    </div>

    <div class="tabs-container" id="resultSection">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('dietaTab', this)">🥗 Plano Alimentar</button>
            <button class="tab-btn" onclick="switchTab('treinoTab', this)">💪 Ficha de Treino ABC</button>
        </div>
        
        <div id="dietaTab" class="tab-content active">
            <div id="dietaOutput"></div>
        </div>
        
        <div id="treinoTab" class="tab-content">
            <div id="treinoOutput"></div>
        </div>
    </div>

    <div class="footer-brand" id="brandFooter">SaaS White Label Oficial</div>
</div>

<script>
    const NOME_ACADEMIA_CLIENTE = "Iron Fitness Club"; 

    let historicoEvolucaoCargas = [];

    document.getElementById('brandName').innerText = NOME_ACADEMIA_CLIENTE;
    document.getElementById('brandFooter').innerText = `Plataforma Exclusiva | ${NOME_ACADEMIA_CLIENTE}`;

    function switchTab(tabId, btn) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        btn.classList.add('active');
    }

    function registrarEvolucao(exercicioNome, inputId) {
        const cargaDigitada = document.getElementById(inputId).value;
        if(!cargaDigitada) { alert("Digite a carga atual para salvar!"); return; }
        
        historicoEvolucaoCargas.push({ exercicio: exercicioNome, carga: cargaDigitada });
        alert(`Sucesso! Carga de ${cargaDigitada}kg salva para o exercício ${exercicioNome}.`);
    }

    function parseTreinoComMidia(textoTreino) {
        const container = document.getElementById('treinoOutput');
        container.innerHTML = "";

        let linhas = textoTreino.split('\n').map(l => l.trim()).filter(l => l.length > 0);
        let cardCount = 0;

        linhas.forEach((linha) => {
            if(linha.toLowerCase().includes("parte 2") || linha.toLowerCase().includes("treino")) return;

            cardCount++;
            let card = document.createElement('div');
            card.className = 'item-card';

            let titulo = document.createElement('div');
            titulo.className = 'item-title';
            titulo.innerText = `🏋️ ${linha.split(',')[0].split('-')[0].trim()}`;
            card.appendChild(titulo);

            let detalhes = document.createElement('div');
            detalhes.className = 'item-subtitle';
            detalhes.innerText = linha.includes(',') ? linha.substring(linha.indexOf(',') + 1).trim() : "4 séries de 10-12 repetições";
            card.appendChild(detalhes);

            // Interface Dinâmica de Monitoramento que substitui o link externo quebrado
            let gifContainer = document.createElement('div');
            gifContainer.className = 'gif-container';
            gifContainer.innerHTML = `
                <div class="biomechanic-scan">
                    <div class="scan-bar"></div>
                    <div class="scan-bar"></div>
                    <div class="scan-bar"></div>
                    <div class="scan-bar"></div>
                    <div class="scan-bar"></div>
                </div>
                <div class="scan-status">📊 Biomecânica Ativa</div>
            `;
            card.appendChild(gifContainer);

            let inputId = `carga_treino_${cardCount}`;
            let evoDiv = document.createElement('div');
            evoDiv.className = 'evolution-row';
            evoDiv.innerHTML = `
                <label style='margin:0;'>CARGA:</label>
                <input type='number' id='${inputId}' value='20'>
                <button class='btn-check' onclick="registrarEvolucao('${linha.replace(/'|"/g, "")}', '${inputId}')">✔️ Concluir Série</button>
            `;
            card.appendChild(evoDiv);
            container.appendChild(card);
        });
    }

    function parseDietaComImagens(textoDieta) {
        let output = document.getElementById('dietaOutput');
        output.innerHTML = "";

        let lines = textoDieta.split('\n');
        
        lines.forEach(linha => {
            if(linha.trim().length === 0) return;
            
            let linhaMinuscula = linha.toLowerCase();
            let imgUrl = "";

            if (linhaMinuscula.includes("ovo") || linhaMinuscula.includes("mexidos")) imgUrl = "https://images.unsplash.com/photo-1525351484163-7529414344d8?w=150&q=80";
            else if (linhaMinuscula.includes("frango") || linhaMinuscula.includes("grelhado")) imgUrl = "https://images.unsplash.com/photo-1604503468506-a8da13d82791?w=150&q=80";
            else if (linhaMinuscula.includes("banana") || linhaMinuscula.includes("fruta")) imgUrl = "https://images.unsplash.com/photo-1571771894821-ce9b6c11b08e?w=150&q=80";
            else if (linhaMinuscula.includes("arroz") || linhaMinuscula.includes("macarrão")) imgUrl = "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=150&q=80";

            if (imgUrl) {
                let foodDiv = document.createElement('div');
                foodDiv.className = 'food-item';
                foodDiv.innerHTML = `
                    <img src="${imgUrl}" class="food-img" alt="Alimento">
                    <div style="font-size:14px; color:#f1f5f9; font-weight:600;">${linha}</div>
                `;
                output.appendChild(foodDiv);
            } else {
                let p = document.createElement('div');
                p.className = 'ai-formatted';
                p.style.padding = "5px 10px";
                p.innerText = linha;
                output.appendChild(p);
            }
        });
    }

    async function generateWhiteLabelPlan() {
        const name = document.getElementById('userName').value.trim() || "Aluno";
        const age = document.getElementById('age').value;
        const weight = document.getElementById('weight').value;
        const height = document.getElementById('height').value;
        const objective = document.getElementById('objective').value;
        const btn = document.getElementById('btnAction');

        btn.disabled = true;
        btn.innerText = "⚡ CALCULANDO ADAPTAÇÃO MUSCULAR...";

        let informacoesEvolucao = historicoEvolucaoCargas.map(c => `${c.exercicio} com ${c.carga}kg`).join(', ');

        let promptMessage = `Você é o Personal Trainer Chefe da ${NOME_ACADEMIA_CLIENTE}. Monte um planejamento físico focado no aluno ${name}.
        Perfil: Idade ${age} anos, Peso ${weight}kg, Altura ${height}cm, Objetivo: ${objective}.`;
        
        if (historicoEvolucaoCargas.length > 0) {
            promptMessage += `\nPROGRESSÃO DETECTADA: O aluno já concluiu exercícios com as cargas: ${informacoesEvolucao}. Reajuste as metas!`;
        }

        promptMessage += `\n\nDivida a resposta exatamente com os dois marcadores abaixo:
        ---DIETA---
        Monte um plano alimentar focado em alimentos simples (Frango, Ovos, Banana, Arroz).
        ---TREINO---
        Escreva uma lista com exatamente 4 principais exercícios físicos da academia (Exemplo: Supino Reto, Agachamento Livre, Rosca Direta, Puxada Costas), colocando cada um em uma única linha direta acompanhado de suas séries, sem numeração e sem símbolos.
        Regra: Não use nenhum asterisco (*) ou hashtag (#).`;

        const url = `https://text.pollinations.ai/${encodeURIComponent(promptMessage)}?model=openai&cache=false`;

        try {
            const response = await fetch(url);
            const fullText = await response.text();

            let dietaText = "";
            let treinoText = "";

            if (fullText.includes("---TREINO---")) {
                let parts = fullText.split("---TREINO---");
                dietaText = parts[0].replace("---DIETA---", "").trim();
                treinoText = parts[1].trim();
            } else if (fullText.toUpperCase().includes("[TREINO]")) {
                let token = fullText.includes("[TREINO]") ? "[TREINO]" : "[treino]";
                let parts = fullText.split(token);
                dietaText = parts[0].replace("[DIETA]", "").replace("[dieta]", "").trim();
                treinoText = parts[1].trim();
            } else {
                dietaText = fullText;
                treinoText = "Supino Reto\nAgachamento Livre\nRosca Direta\nPuxada Costas";
            }

            document.getElementById('resultSection').style.display = 'block';
            document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });

            parseDietaComImagens(dietaText);
            parseTreinoComMidia(treinoText);

        } catch (error) {
            alert("Erro na rede. Por favor, clique novamente para reconectar.");
        } finally {
            btn.disabled = false;
            btn.innerText = "🚀 Consultar Meu Personal Trainer AI";
        }
    }
</script>

</body>
</html>
